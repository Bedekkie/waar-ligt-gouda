<!DOCTYPE html>
<html>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Waar ligt Gouda?</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
#app {
  position: relative;
  width: min(380px, 100vw);
  aspect-ratio: 9/16;
  border-radius: 20px;
  overflow: hidden;
  background: #111;
}
#bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0.55;
  filter: brightness(0.7) saturate(0.8);
}
#overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 35%, transparent 58%, rgba(0,0,0,0.75) 100%);
}
#title {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 22px 20px 0;
  text-align: center; z-index: 20;
}
#title h1 { font-size: 22px; font-weight: 700; color: #fff; text-shadow: 0 1px 8px rgba(0,0,0,0.8); letter-spacing: 0.5px; }
#title p { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 3px; }
#compass-area {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
}
#rotator {
  position: relative;
  width: 260px; height: 260px;
  transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
}
#compass-ring {
  position: absolute; inset: 0;
  opacity: 0.45;
}
#person {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  /* transform-origin at shoulder: 78.8% from left, 24% from top of the 160x288 image
     But scaled to fit 260x260 container with object-fit:contain:
     image is 160w x 288h, container 260x260
     scale factor = 260/288 = 0.903 → rendered: 144.4w x 260h, centered
     left offset = (260-144.4)/2 = 57.8px
     shoulder in rendered: x = 57.8 + 0.788*144.4 = 57.8+113.8 = 171.6px → 66.0%
                           y = 0.24*260 = 62.4px → 24.0%  */
  transform-origin: 66% 24%;
  mix-blend-mode: screen;
}
#infobox {
  position: absolute; bottom: 70px; left: 16px; right: 16px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,210,60,0.4);
  border-radius: 14px;
  padding: 10px 14px;
  z-index: 20; text-align: center;
}
#dir { color: rgba(255,210,60,1); font-size: 13px; font-weight: 600; }
#dist { color: rgba(255,255,255,0.6); font-size: 11px; margin-top: 3px; }
#startbtn {
  position: absolute; bottom: 20px; left: 0; right: 0;
  text-align: center; z-index: 20;
}
button {
  background: rgba(255,210,60,0.15);
  border: 1px solid rgba(255,210,60,0.5);
  color: rgba(255,210,60,1);
  padding: 10px 28px;
  border-radius: 22px;
  font-size: 13px; cursor: pointer;
}
</style>

<script>
const GOUDA = {lat:52.0116, lng:4.7083};
// Arm points LEFT in photo = West = 270° compass
// So rotation offset = 270 (we subtract this so arm points toward bearing)
const ARM_OFFSET = 270;
let heading = 0, userLat = null, userLng = null, started = false;

function toRad(d) { return d * Math.PI / 180; }

function bearing(lat1, lng1, lat2, lng2) {
  const dL = toRad(lng2-lng1);
  const y = Math.sin(dL)*Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1))*Math.sin(toRad(lat2)) - Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(dL);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

function distance(lat1, lng1, lat2, lng2) {
  const R=6371, dLat=toRad(lat2-lat1), dL=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dL/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function compassDir(b) {
  return ['Noord','NNO','Noord-Oost','ONO','Oost','OZO','Zuid-Oost','ZZO',
          'Zuid','ZZW','Zuid-West','WZW','West','WNW','Noord-West','NNW'][Math.round(b/22.5)%16];
}

function updateArrow() {
  if (userLat === null) return;
  const b = bearing(userLat, userLng, GOUDA.lat, GOUDA.lng);
  // rotation = bearing_to_gouda - device_heading - arm_offset
  const angle = (b - heading - ARM_OFFSET + 720) % 360;
  document.getElementById('rotator').style.transform = 'rotate('+angle+'deg)';
  document.getElementById('dir').textContent = 'Gouda ligt ' + compassDir(b);
  document.getElementById('dist').textContent = distance(userLat, userLng, GOUDA.lat, GOUDA.lng) + ' km van jou vandaan';
}

function startApp() {
  if (started) return;
  started = true;
  document.querySelector('button').textContent = 'Actief...'; document.getElementById('status').textContent = 'GPS ophalen...';

  if ('geolocation' in navigator) {
    navigator.geolocation.getCurrentPosition(
      p => {
        userLat = p.coords.latitude;
        userLng = p.coords.longitude;
        updateArrow();
        navigator.geolocation.watchPosition(p => {
          userLat = p.coords.latitude; userLng = p.coords.longitude; updateArrow();
        }, null, {enableHighAccuracy:true});
      },
      () => { userLat = 52.37; userLng = 4.89; updateArrow(); }
    );
  } else { userLat = 52.37; userLng = 4.89; updateArrow(); }

  // Compass: prefer absolute orientation, fall back to relative + webkitCompassHeading
  let usingAbsolute = false;

  const listenAbsolute = e => {
    if (e.alpha == null) return;
    usingAbsolute = true;
    heading = (360 - e.alpha) % 360;
    updateArrow();
  };

  const listenRelative = e => {
    if (usingAbsolute) return; // absolute already working, ignore relative
    if (e.webkitCompassHeading != null) {
      heading = e.webkitCompassHeading; // iOS: already compass-corrected
      updateArrow();
    } else if (e.alpha != null) {
      heading = (360 - e.alpha) % 360;
      updateArrow();
    }
  };

  function attachListeners() {
    window.addEventListener('deviceorientationabsolute', listenAbsolute, true);
    window.addEventListener('deviceorientation', listenRelative, true);
    document.getElementById('status').textContent = 'Kompas actief';
  }

  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+ — permission must be requested from a user gesture (we're inside button click, so fine)
    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') {
          attachListeners();
        } else {
          document.getElementById('status').textContent = 'Geen kompas-toegang — alleen GPS';
        }
      })
      .catch(() => { attachListeners(); }); // try anyway
  } else {
    attachListeners(); // Android / non-iOS
  }
}
</script>
