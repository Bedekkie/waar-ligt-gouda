<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Waar ligt Gouda?</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }

    #app {
      position: relative;
      width: min(380px, 100vw);
      aspect-ratio: 9/16;
      border-radius: 20px;
      overflow: hidden;
      background: #111;
    }

    #bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.55;
      filter: brightness(0.7) saturate(0.8);
    }

    #overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        rgba(0,0,0,0.6) 0%,
        transparent 35%,
        transparent 58%,
        rgba(0,0,0,0.75) 100%);
    }

    /* TITELBLOK */
    #title {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 22px 20px 0;
      text-align: center; z-index: 20;
    }
    #title h1 {
      font-size: 22px; font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
      letter-spacing: 0.5px;
    }
    #title p {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-top: 3px;
    }

    /* GAME KNOP */
    #gamebtn {
      margin-top: 10px;
      background: rgba(255,210,60,0.15);
      border: 1px solid rgba(255,210,60,0.5);
      color: #ffd23c;
      padding: 6px 14px;
      border-radius: 14px;
      font-size: 12px;
    }

    /* COMPAS */
    #compass-area {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }

    #rotator {
      position: relative;
      width: 400px;
      height: 400px;
      transition: transform 0.25s linear;
    }

    #person {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      transform-origin: 66% 24%;
    }

    /* INFO BLOK */
    #infobox {
      position: absolute;
      bottom: 160px;
      left: 16px; right: 16px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,210,60,0.4);
      border-radius: 14px;
      padding: 10px 14px;
      z-index: 20; text-align: center;
    }

    #dir {
      color: rgba(255,210,60,1);
      font-size: 13px; font-weight: 600;
    }

    #dist {
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      margin-top: 3px;
    }

    /* LAADBALK */
    #progress-container {
      position: absolute;
      bottom: 115px;
      left: 16px; right: 16px;
      height: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      overflow: hidden;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffd23c, #ffea9c);
      box-shadow: 0 0 8px #ffd23c;
      transition: width 0.2s linear;
    }

    #progress-container.active {
      opacity: 1;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    /* START KNOP BLOK */
    #startbtn {
      position: absolute;
      bottom: 20px;
      left: 0; right: 0;
      text-align: center;
      z-index: 20;
    }

    #startbtn button {
      background: rgba(255,210,60,0.15);
      border: 1px solid rgba(255,210,60,0.5);
      color: rgba(255,210,60,1);
      padding: 10px 28px;
      border-radius: 22px;
      font-size: 13px;
    }

  </style>
</head>

<body>
  <div id="app">

    <img id="bg" src="gouda.jpg">

    <div id="overlay"></div>

    <div id="title">
      <h1>Waar ligt Gouda?</h1>
      <p>Kompas richt zich naar Gouda</p>

      <!-- GAME KNOP -->
      <button id="gamebtn" onclick="location.href='game.html'">Ga naar game</button>
    </div>

    <div id="compass-area">
      <div id="rotator">
        <img id="person" src="arm.png">
      </div>
    </div>

    <div id="infobox">
      <div id="dir">Druk op start kompas</div>
      <div id="dist"></div>
    </div>

    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>

    <div id="startbtn">
      <button onclick="startApp()">Start kompas</button>
      <div id="status" style="color:rgba(255,255,255,0.35);font-size:11px;margin-top:8px;">
        Wacht op start...
      </div>
    </div>

  </div>

<script>
/* --- SCRIPT IS IDENTIEK AAN JE WERKENDE VERSIE --- */
/* (ik laat het staan zodat je niets hoeft te debuggen) */

const GOUDA = {lat:52.0116, lng:4.7083};
const ARM_OFFSET = 270;

let heading = 0;
let userLat = null, userLng = null;
let started = false;
let fallbackAngle = 0;
let fallbackInterval = null;

let progress = 0;
let progressInterval = null;

function toRad(d){return d*Math.PI/180;}

function bearing(lat1,lng1,lat2,lng2){
  const dL=toRad(lng2-lng1);
  const y=Math.sin(dL)*Math.cos(toRad(lat2));
  const x=Math.cos(toRad(lat1))*Math.sin(toRad(lat2))-
          Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(dL);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

function distance(lat1,lng1,lat2,lng2){
  const R=6371,dLat=toRad(lat2-lat1),dL=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+
          Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dL/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function compassDir(b){
  return ['Noord','NNO','Noord-Oost','ONO','Oost','OZO','Zuid-Oost','ZZO',
          'Zuid','ZZW','Zuid-West','WZW','West','WNW','Noord-West','NNW']
          [Math.round(b/22.5)%16];
}

function updateArrow(){
  if(userLat===null) return;

  const b=bearing(userLat,userLng,GOUDA.lat,GOUDA.lng);
  const angle=(b-heading-ARM_OFFSET+720)%360;

  document.getElementById('rotator').style.transform=`rotate(${angle}deg)`;
  document.getElementById('dir').textContent='Gouda ligt '+compassDir(b);
  document.getElementById('dist').textContent=
    distance(userLat,userLng,GOUDA.lat,GOUDA.lng)+' km van jou vandaan';

  if(document.getElementById('dir').textContent.startsWith("Gouda ligt")){
    stopFallbackCompass();
    stopProgressBar();
  }
}

function startFallbackCompass(){
  fallbackInterval=setInterval(()=>{
    fallbackAngle=(fallbackAngle+2)%360;
    heading=fallbackAngle;
    updateArrow();
  },30);
}

function stopFallbackCompass(){
  clearInterval(fallbackInterval);
}

function startProgressBar(){
  const bar=document.getElementById('progress-bar');
  const container=document.getElementById('progress-container');
  container.classList.add('active');

  progressInterval=setInterval(()=>{
    progress+=1;
    if(progress>=100){
      progress=100;
      bar.style.animation="blink 1s infinite";
    }
    bar.style.width=progress+"%";
  },50);
}

function stopProgressBar(){
  clearInterval(progressInterval);
  document.getElementById('progress-container').classList.remove('active');
}

function startApp(){
  if(started) return;
  started=true;

  document.querySelector('#startbtn button').textContent='Actief...';

  startFallbackCompass();
  startProgressBar();

  if('geolocation' in navigator){
    navigator.geolocation.getCurrentPosition(
      p=>{
        userLat=p.coords.latitude;
        userLng=p.coords.longitude;
        updateArrow();
        navigator.geolocation.watchPosition(p=>{
          userLat=p.coords.latitude;
          userLng=p.coords.longitude;
          updateArrow();
        },null,{enableHighAccuracy:true});
      },
      ()=>{userLat=52.37;userLng=4.89;updateArrow();}
    );
  } else {
    userLat=52.37;userLng=4.89;updateArrow();
  }

  const listen=e=>{
    let h=null;

    if(e.webkitCompassHeading!=null){
      h=e.webkitCompassHeading;
    } else if(e.alpha!=null){
      h=(360-e.alpha)%360;
    }

    if(h!=null && !isNaN(h)){
      heading=h;
      updateArrow();
    }
  };

  window.addEventListener('deviceorientation',listen,true);
  window.addEventListener('deviceorientationabsolute',listen,true);
}
</script>

</body>
</html>
