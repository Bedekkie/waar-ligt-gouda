<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trollen-Dodger</title>

<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #gameContainer {
        position: relative;
        width: 100%;
        max-width: 480px;
        height: 90vh;
        background: #000;
        border: 2px solid #444;
        overflow: hidden;
    }

    #janBar {
        height: 60px;
        display: flex;
        align-items: center;
        padding: 10px;
        background: #111;
        border-bottom: 1px solid #333;
        z-index: 10;
    }

    #janEmoji { font-size: 32px; margin-right: 10px; }
    #janLabel { flex: 1; font-size: 14px; color: #ccc; }
    #scoreBox { text-align: right; font-size: 14px; }

    #playField {
        position: absolute;
        top: 60px;
        width: 100%;
        height: calc(100% - 60px);
        background: radial-gradient(circle at top, #222 0, #000 60%);
        overflow: hidden;
    }

    #player {
        position: absolute;
        bottom: 80px;
        left: 50%;
        width: 45px;
        height: 45px;
        margin-left: -22px;
        background: #4caf50;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
    }

    .bullet {
        position: absolute;
        top: 0;
        padding: 6px 10px;
        background: #b71c1c;
        color: #fff;
        border-radius: 12px;
        font-size: 13px;
        max-width: 70%;
        line-height: 1.2;
        box-shadow: 0 0 6px rgba(255,0,0,0.7);
        white-space: pre-wrap;
        word-wrap: break-word;
    }

    .powerdown {
        position: absolute;
        top: 0;
        padding: 6px 10px;
        background: #888;
        color: #fff;
        border-radius: 12px;
        font-size: 16px;
        box-shadow: 0 0 6px rgba(200,200,200,0.7);
    }

    #regenOverlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.85);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 50;
        text-align: center;
        color: #fff;
        font-size: 32px;
    }

    #regenClock {
        position: absolute;
        top: 70px;
        right: 10px;
        background: rgba(255,0,0,0.7);
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 22px;
        display: none;
        z-index: 20;
    }

    #gameOver {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.95);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
        z-index: 100;
    }

    #gameOver img {
        width: 200px;
        border-radius: 10px;
        margin-bottom: 20px;
    }

    #restartBtn {
        margin-top: 15px;
        padding: 10px 20px;
        background: #f44336;
        border: none;
        border-radius: 8px;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="gameContainer">

    <div id="janBar">
        <div id="janEmoji">🙂</div>
        <div id="janLabel">Jan warmt op… ontwijk zijn trollen!</div>
        <div id="scoreBox">
            Score: <span id="score">0</span><br>
            High: <span id="highscore">0</span>
        </div>
    </div>

    <div id="regenClock">30</div>

    <div id="playField">
        <div id="player">🧍</div>
    </div>

    <div id="regenOverlay">
        <div>TROLLENREGEN!!!</div>
    </div>

    <div id="gameOver">
        <img src="jan.png" alt="Jan">
        <h1>HA! Je trapte in de trollenval, kneus!</h1>
        <p>Score: <span id="finalScore">0</span></p>
        <p>Highscore: <span id="finalHighscore">0</span></p>
        <button id="restartBtn">Opnieuw</button>
    </div>

</div>

<script>
// -----------------------------
//  QUOTES
// -----------------------------
const janTopics = {
    antiAmerica: [
        "Amerika is een wapenfabriek verkleed als land.",
        "Amerikaanse oorlogen zijn DLC-pakketten voor hun economie.",
        "Ik heb deze joggingbroek al 8 dagen aan",
        "Amerika bestaat alleen om olie te jatten."
    ],
    huishouden: [
        "Bregje nog in haar STER gepakt Bart?",
        "Bregje doet echt niks in het huishouden",
        "Ik doe alleen dingen als Anne er om vraagt"
    ],
    vrouwen: [
        "Vrouwen willen gelijkheid maar alleen als het uitkomt.",
        "Vrouwen lokken sowieso alles zelf uit."
    ],
    ukraine: [
        "ukraine kan niks tegen de drones van Uncle",
        "Bart die vliegdekschepen van Amerika zijn niks. Bart. Bart!!! Vliegdekschepen!!",
        "ukraine is een PR-stunt."
    ],
    lhbti: [
        "Shit heb al 3 dagen m'n tanden niet gepoetst",
        "De regenbooglobby bepaalt alles.",
        "LHBTQ is indoctrinatie."
    ],
    antiAI: [
        "Ga lekker AI omarmen, ben je zo je baan kwijt",
        "Dat AI kan echt niks. Beetje developer lacht erom",
        "AI is een complot van techbedrijven."
    ]
};

// -----------------------------
//  STATE
// -----------------------------
const playField = document.getElementById("playField");
const player = document.getElementById("player");
const regenOverlay = document.getElementById("regenOverlay");
const regenClock = document.getElementById("regenClock");
const scoreEl = document.getElementById("score");
const highscoreEl = document.getElementById("highscore");
const finalScoreEl = document.getElementById("finalScore");
const finalHighscoreEl = document.getElementById("finalHighscore");
const gameOverScreen = document.getElementById("gameOver");

let bullets = [];
let powerdowns = [];
let score = 0;
let highscore = parseInt(localStorage.getItem("td_high") || "0");
highscoreEl.textContent = highscore;

let playerX = 0.5;
let running = true;

let lastTime = performance.now();
let nextSpawnTime = 0;

let regenMode = false;
let regenEndTime = 0;

// -----------------------------
//  HELPERS
// -----------------------------
function randomQuote() {
    const cats = Object.keys(janTopics);
    const cat = cats[Math.floor(Math.random() * cats.length)];
    const q = janTopics[cat][Math.floor(Math.random() * janTopics[cat].length)];
    if (q.length > 45) {
        const mid = Math.floor(q.length / 2);
        return q.slice(0, mid) + "\n" + q.slice(mid);
    }
    return q;
}

// -----------------------------
//  BULLET SPAWN
// -----------------------------
function spawnBullet(force = false) {
    if (!force && !regenMode && bullets.length >= 4) return;

    const el = document.createElement("div");
    el.className = "bullet";
    el.textContent = randomQuote();

    const fieldWidth = playField.clientWidth;

    let x = Math.random() * (fieldWidth * 0.7);
    el.style.left = x + "px";
    el.style.top = "0px";

    const baseSpeed = 0.55 + Math.random() * 0.35;
    const bonus = score * 0.015;
    const regenBoost = regenMode ? 0.4 : 0;

    bullets.push({ el, x, y: 0, speed: baseSpeed + bonus + regenBoost });
    playField.appendChild(el);
}

// -----------------------------
//  POWERDOWN SPAWN
// -----------------------------
function spawnPowerdown() {
    if (regenMode) return;
    if (powerdowns.length >= 6) return;
    if (Math.random() > 0.01) return;

    const el = document.createElement("div");
    el.className = "powerdown";
    el.textContent = "☁️";

    const x = Math.random() * (playField.clientWidth - 60);
    el.style.left = x + "px";
    el.style.top = "0px";

    powerdowns.push({ el, x, y: 0, speed: 0.4 });
    playField.appendChild(el);
}

// -----------------------------
//  TROLLENREGEN
// -----------------------------
function activateRegen() {
    regenMode = true;

    regenOverlay.style.display = "flex";
    regenClock.style.display = "block";

    regenEndTime = performance.now() + 30000;

    setTimeout(() => {
        regenOverlay.style.display = "none";
    }, 1000);
}

function updateRegenClock(t) {
    if (!regenMode) return;

    const remaining = Math.max(0, Math.ceil((regenEndTime - t) / 1000));
    regenClock.textContent = remaining;

    if (remaining <= 0) {
        regenMode = false;
        regenClock.style.display = "none";
    }
}

// -----------------------------
//  UPDATE LOOPS
// -----------------------------
function updateBullets(delta) {
    const fieldHeight = playField.clientHeight;
    const playerRect = player.getBoundingClientRect();

    bullets = bullets.filter(b => {
        b.y += b.speed * (delta / 16);
        b.el.style.top = b.y + "px";

        const rect = b.el.getBoundingClientRect();
        const hit =
            rect.left < playerRect.right &&
            rect.right > playerRect.left &&
            rect.top < playerRect.bottom &&
            rect.bottom > playerRect.top;

        if (hit) {
            gameOver();
            return false;
        }

        if (b.y > fieldHeight + 50) {
            playField.removeChild(b.el);
            score++;
            scoreEl.textContent = score;
            return false;
        }

        return true;
    });
}

function updatePowerdowns(delta) {
    const playerRect = player.getBoundingClientRect();

    powerdowns = powerdowns.filter(p => {
        p.y += p.speed * (delta / 16);
        p.el.style.top = p.y + "px";

        const rect = p.el.getBoundingClientRect();
        const hit =
            rect.left < playerRect.right &&
            rect.right > playerRect.left &&
            rect.top < playerRect.bottom &&
            rect.bottom > playerRect.top;

        if (hit) {
            activateRegen();
            playField.removeChild(p.el);
            return false;
        }

        if (p.y > playField.clientHeight + 50) {
            playField.removeChild(p.el);
            return false;
        }

        return true;
    });
}

// -----------------------------
//  GAME LOOP
// -----------------------------
function loop(t) {
    const delta = t - lastTime;
    lastTime = t;

    updateRegenClock(t);

    if (regenMode) {
        if (Math.random() < 0.35) spawnBullet(true);
    } else {
        if (t > nextSpawnTime && bullets.length < 4) {
            spawnBullet();
            nextSpawnTime = t + (700 + Math.random() * 400);
        }
    }

    spawnPowerdown();
    updatePowerdowns(delta);
    updateBullets(delta);

    updatePlayer();

    requestAnimationFrame(loop);
}

// -----------------------------
//  PLAYER
// -----------------------------
function updatePlayer() {
    const w = playField.clientWidth;
    player.style.left = (playerX * w - player.clientWidth / 2) + "px";
}

document.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft") playerX -= 0.05;
    if (e.key === "ArrowRight") playerX += 0.05;
    playerX = Math.max(0.05, Math.min(0.95, playerX));
});

let touchStartX = null;

playField.addEventListener("touchstart", e => {
    touchStartX = e.touches[0].clientX;
});

playField.addEventListener("touchmove", e => {
    const x = e.touches[0].clientX;
    const diff = x - touchStartX;
    playerX += diff / playField.clientWidth;
    playerX = Math.max(0.05, Math.min(0.95, playerX));
    touchStartX = x;
});

// -----------------------------
//  GAME OVER
// -----------------------------
function gameOver() {
    running = false;

    bullets.forEach(b => b.el.remove());
    powerdowns.forEach(p => p.el.remove());

    bullets = [];
    powerdowns = [];

    if (score > highscore) {
        highscore = score;
        localStorage.setItem("td_high", highscore);
    }

    finalScoreEl.textContent = score;
    finalHighscoreEl.textContent = highscore;

    gameOverScreen.style.display = "flex";
}

// -----------------------------
//  RESTART
// -----------------------------
restartBtn.addEventListener("click", () => {
    score = 0;
    scoreEl.textContent = 0;

    bullets.forEach(b => b.el.remove());
    powerdowns.forEach(p => p.el.remove());

    bullets = [];
    powerdowns = [];

    regenMode = false;
    regenClock.style.display = "none";
    regenOverlay.style.display = "none";

    running = true;
    lastTime = performance.now();
    nextSpawnTime = lastTime + 800;

    gameOverScreen.style.display = "none";

    requestAnimationFrame(loop);
});

// -----------------------------
//  START
// -----------------------------
updatePlayer();
nextSpawnTime = performance.now() + 800;
requestAnimationFrame(loop);
</script>

</body>
</html>
