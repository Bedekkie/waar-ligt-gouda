<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trollen-Dodger Chaotic+</title>

<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #gameContainer {
        position: relative;
        width: 100%;
        max-width: 480px;
        height: 90vh;
        max-height: 800px;
        background: #000;
        border: 2px solid #444;
        overflow: hidden;
    }

    #janBar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 10px;
        background: #111;
        border-bottom: 1px solid #333;
        z-index: 10;
    }

    #janEmoji { font-size: 32px; }
    #janLabel { font-size: 14px; color: #ccc; flex: 1; margin-left: 10px; }
    #scoreBox { font-size: 14px; text-align: right; min-width: 80px; }

    #playField {
        position: absolute;
        top: 60px;
        left: 0;
        width: 100%;
        height: calc(100% - 60px);
        overflow: hidden;
        background: radial-gradient(circle at top, #222 0, #000 60%);
    }

    #player {
        position: absolute;
        bottom: 80px; /* omhoog gezet */
        left: 50%;
        width: 45px;
        height: 45px;
        margin-left: -22px;
        background: #4caf50;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
    }

    .bullet {
        position: absolute;
        top: 60px;
        left: 0;
        padding: 6px 10px;
        background: #b71c1c;
        color: #fff;
        border-radius: 12px;
        font-size: 12px;
        max-width: 70%;
        box-shadow: 0 0 6px rgba(255,0,0,0.7);
        white-space: normal;
        word-wrap: break-word;
    }

    .powerup {
        position: absolute;
        padding: 6px 10px;
        background: #2196f3;
        color: #fff;
        border-radius: 12px;
        font-size: 12px;
        box-shadow: 0 0 6px rgba(0,150,255,0.7);
    }

    #gameOver {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.95);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
        z-index: 20;
    }

    #gameOver img {
        width: 200px;
        height: auto;
        border-radius: 10px;
        margin-bottom: 20px;
    }

    #restartBtn {
        margin-top: 15px;
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: #f44336;
        color: #fff;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="gameContainer">
    <div id="janBar">
        <div id="janEmoji">🙂</div>
        <div id="janLabel">Jan warmt op… ontwijk zijn trollen!</div>
        <div id="scoreBox">
            Score: <span id="score">0</span><br>
            High: <span id="highscore">0</span>
        </div>
    </div>

    <div id="playField">
        <div id="player">🧍</div>
    </div>

    <div id="gameOver">
        <img src="jan.png" alt="Jan">
        <h1>HA! Je trapte in de trollenval, kneus!</h1>
        <p>Score: <span id="finalScore">0</span></p>
        <p>Highscore: <span id="finalHighscore">0</span></p>
        <button id="restartBtn">Opnieuw</button>
    </div>
</div>
