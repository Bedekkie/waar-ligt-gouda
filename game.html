<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Gouda Game</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #000;
      overflow: hidden;
      touch-action: none;
      height: 100%;
      font-family: sans-serif;
    }

    #app {
      position: relative;
      width: min(380px, 100vw);
      height: 100vh;
      margin: 0 auto;
      border-radius: 20px;
      overflow: hidden;
      background: #111;
    }

    #bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.55;
      filter: brightness(0.7) saturate(0.8);
    }

    #overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        rgba(0,0,0,0.6) 0%,
        transparent 35%,
        transparent 58%,
        rgba(0,0,0,0.75) 100%);
    }

    /* TITEL */
    #title {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 22px 20px 0;
      text-align: center; z-index: 20;
    }
    #title h1 {
      font-size: 22px; font-weight: 700;
      color: #fff;
    }
    #title p {
      font-size: 16px;
      color: rgba(255,255,255,0.9);
      margin-top: 10px;
      font-weight: 700;
      line-height: 1.3;
    }

    /* HIGHSCORES */
    #highscores {
      margin-top: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      line-height: 1.2;
    }

    /* TERUG KNOP */
    #backbtn {
      margin-top: 10px;
      text-align: center;
      z-index: 30;
      position: relative;
    }
    #backbtn button {
      background: rgba(255,210,60,0.2);
      border: 1px solid rgba(255,210,60,0.5);
      color: #ffd23c;
      padding: 6px 12px;
      border-radius: 10px;
      font-size: 12px;
    }

    /* MAN + ROTATIE */
    #compass-area {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }

    #rotator {
      position: relative;
      width: 400px;
      height: 400px;
      transition: transform 1s ease;
    }

    #person {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      transform-origin: 66% 24%;
    }

    /* LAADBALK */
    #loadbar {
      position: absolute;
      bottom: 180px;
      left: 16px; right: 16px;
      height: 12px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      overflow: hidden;
      z-index: 30;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #loadbar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffd23c, #ffea9c);
      box-shadow: 0 0 8px #ffd23c;
      transition: width 0.2s linear;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    /* CHECK KNOP */
    #checkbtn {
      position: absolute;
      bottom: 120px;
      left: 0; right: 0;
      text-align: center;
      z-index: 20;
    }

    #checkbtn button {
      background: rgba(255,210,60,0.2);
      border: 1px solid rgba(255,210,60,0.5);
      color: #ffd23c;
      padding: 12px 32px;
      border-radius: 22px;
      font-size: 16px;
    }

    /* TEKSTBALLON */
    #speech {
      position: absolute;
      bottom: 240px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 900;
      display: none;
      z-index: 30;
      border: 2px solid rgba(255,210,60,0.8);
      text-align: center;
      white-space: pre-line;
      text-shadow: 0 0 8px black;
    }

    /* OPNIEUW KNOP */
    #retrybtn {
      position: absolute;
      bottom: 70px;
      left: 0; right: 0;
      text-align: center;
      display: none;
      z-index: 30;
    }

    #retrybtn button {
      background: rgba(255,210,60,0.2);
      border: 1px solid rgba(255,210,60,0.5);
      color: #ffd23c;
      padding: 10px 28px;
      border-radius: 22px;
      font-size: 14px;
    }

    /* CONFETTI */
    .confetti {
      position: absolute;
      width: 8px;
      height: 12px;
      background: red;
      top: -20px;
      animation: fall 2.5s linear forwards;
      opacity: 0.9;
    }

    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(120vh) rotate(360deg); }
    }

  </style>
</head>

<body>
  <div id="app">

    <img id="bg" src="gouda.jpg">
    <div id="overlay"></div>

    <div id="title">
      <h1>Waar ligt Gouda?</h1>

      <div id="backbtn">
        <button onclick="location.href='index.html'">Terug naar het kompas</button>
      </div>

      <p>Draai de arm van Bart naar Gouda en druk op "Check!"</p>

      <div id="highscores"></div>
    </div>

    <div id="compass-area">
      <div id="rotator">
        <img id="person" src="arm.png">
      </div>
    </div>

    <div id="loadbar">
      <div id="loadbar-fill"></div>
    </div>

    <div id="speech"></div>

    <div id="retrybtn">
      <button onclick="location.reload()">Opnieuw</button>
    </div>

    <div id="checkbtn">
      <button onclick="checkGuess()">Check!</button>
    </div>

  </div>

<script>
const GOUDA = {lat:52.0116, lng:4.7083};

let userLat = null, userLng = null;
let fixedCorrectAngle = null;

let currentAngle = 0;
let dragging = false;
let startAngle = 0;

let loadProgress = 0;
let loadInterval = null;

/* ------------------ HIGHSCORE FUNCTIES ------------------ */

function loadHighscores() {
  let scores = JSON.parse(localStorage.getItem("goudaScores") || "[]");
  return scores;
}

function saveHighscore(score) {
  let scores = loadHighscores();
  scores.push(score);
  scores.sort((a,b)=>a-b);
  scores = scores.slice(0,3);
  localStorage.setItem("goudaScores", JSON.stringify(scores));
}

function displayHighscores() {
  let scores = loadHighscores();
  let box = document.getElementById("highscores");

  if (scores.length === 0) {
    box.textContent = "Highscores: nog geen scores";
    return;
  }

  let html = "Highscores:<br>";
  scores.forEach((s,i)=>{
    html += `${i+1}. ${s}°<br>`;
  });

  box.innerHTML = html;
}

/* -------------------------------------------------------- */

function toRad(d){return d*Math.PI/180;}

function bearing(lat1,lng1,lat2,lng2){
  const dL=toRad(lng2-lng1);
  const y=Math.sin(dL)*Math.cos(toRad(lat2));
  const x=Math.cos(toRad(lat1))*Math.sin(toRad(lat2))-
          Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(dL);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

function updateRotation(){
  document.getElementById('rotator').style.transform = `rotate(${currentAngle}deg)`;
}

function getTouchAngle(e){
  const rect = document.getElementById('rotator').getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const x = e.touches[0].clientX - cx;
  const y = e.touches[0].clientY - cy;
  return Math.atan2(y,x)*180/Math.PI;
}

document.getElementById('rotator').addEventListener('touchstart', e=>{
  dragging = true;
  startAngle = getTouchAngle(e) - currentAngle;
});

document.addEventListener('touchmove', e=>{
  if(!dragging) return;
  const angle = getTouchAngle(e);
  currentAngle = angle - startAngle;
  updateRotation();
});

document.addEventListener('touchend', ()=> dragging=false);

function startLoadbar(){
  const bar = document.getElementById('loadbar');
  const fill = document.getElementById('loadbar-fill');

  bar.style.opacity = 1;
  loadProgress = 0;

  fill.style.animation = "blink 1s infinite";

  loadInterval = setInterval(()=>{
    loadProgress += 2;
    if(loadProgress > 100) loadProgress = 100;
    fill.style.width = loadProgress + "%";
  }, 40);
}

function stopLoadbar(){
  clearInterval(loadInterval);
  document.getElementById('loadbar').style.opacity = 0;
}

/* ------------------ CONFETTI ------------------ */

function launchConfetti() {
  for (let i = 0; i < 80; i++) {
    const c = document.createElement("div");
    c.classList.add("confetti");

    c.style.left = Math.random() * 100 + "%";

    const colors = ["#ff3838", "#ff9f1a", "#fffa65", "#32ff7e", "#18dcff", "#7d5fff"];
    c.style.background = colors[Math.floor(Math.random()*colors.length)];

    c.style.animationDuration = (2 + Math.random()*1.5) + "s";

    document.body.appendChild(c);

    setTimeout(()=>c.remove(), 3000);
  }
}

/* ------------------ CHECK LOGICA ------------------ */

function checkGuess(){
  startLoadbar();

  // ⭐ Zorg dat we ALTIJD een geldige correctAngle hebben
  if (fixedCorrectAngle === null) {
    const lat = userLat ?? 52.37;
    const lng = userLng ?? 4.89;
    const b = bearing(lat, lng, GOUDA.lat, GOUDA.lng);
    fixedCorrectAngle = b - 270;
  }

  const correctAngle = fixedCorrectAngle;

  const diff = Math.abs((currentAngle - correctAngle + 540) % 360 - 180);
  const rounded = Math.round(diff);

  saveHighscore(rounded);
  displayHighscores();

  setTimeout(()=>{

    document.getElementById('rotator').style.transition = "transform 1s ease";
    document.getElementById('rotator').style.transform = `rotate(${correctAngle}deg)`;

    stopLoadbar();

    const speech = document.getElementById('speech');

    if (rounded === 0) {
      launchConfetti();
      speech.textContent = "PERFECT! 0° verschil!";
    } else {
      speech.textContent = `NEE GOUDA LIGT DAAR, KNEUS!\nJe zat ${rounded}° ernaast`;
    }

    speech.style.display = "block";
    document.getElementById('retrybtn').style.display = "block";

  }, 1200);
}

/* ⭐ GPS EENMALIG OPHALEN → BEARING VASTZETTEN */
navigator.geolocation.getCurrentPosition(
  p=>{
    userLat=p.coords.latitude;
    userLng=p.coords.longitude;

    const b = bearing(userLat,userLng,GOUDA.lat,GOUDA.lng);
    fixedCorrectAngle = b - 270;

    displayHighscores();
  },
  ()=>{
    userLat=52.37; userLng=4.89;
    const b = bearing(userLat,userLng,GOUDA.lat,GOUDA.lng);
    fixedCorrectAngle = b - 270;

    displayHighscores();
  }
);
</script>

</body>
</html>
