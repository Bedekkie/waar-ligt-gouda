<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Gouda Game</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }

    #app {
      position: relative;
      width: min(380px, 100vw);
      aspect-ratio: 9/16;
      border-radius: 20px;
      overflow: hidden;
      background: #111;
    }

    #bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.55;
      filter: brightness(0.7) saturate(0.8);
    }

    #overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        rgba(0,0,0,0.6) 0%,
        transparent 35%,
        transparent 58%,
        rgba(0,0,0,0.75) 100%);
    }

    /* TITEL */
    #title {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 22px 20px 0;
      text-align: center; z-index: 20;
    }
    #title h1 {
      font-size: 22px; font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    }
    #title p {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-top: 3px;
    }

    /* TERUG KNOP */
    #backbtn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 30;
    }
    #backbtn button {
      background: rgba(255,210,60,0.2);
      border: 1px solid rgba(255,210,60,0.5);
      color: #ffd23c;
      padding: 6px 12px;
      border-radius: 10px;
      font-size: 12px;
    }

    /* MAN + ROTATIE */
    #compass-area {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }

    #rotator {
      position: relative;
      width: 400px;
      height: 400px;
      transition: transform 1s ease;
    }

    #person {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      transform-origin: 66% 24%;
    }

    /* CHECK KNOP */
    #checkbtn {
      position: absolute;
      bottom: 40px;
      left: 0; right: 0;
      text-align: center;
      z-index: 20;
    }

    #checkbtn button {
      background: rgba(255,210,60,0.2);
      border: 1px solid rgba(255,210,60,0.5);
      color: #ffd23c;
      padding: 10px 28px;
      border-radius: 22px;
      font-size: 14px;
    }

    /* TEKSTBALLON */
    #speech {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      z-index: 30;
      border: 1px solid rgba(255,210,60,0.5);
    }

    /* OPNIEUW KNOP */
    #retrybtn {
      position: absolute;
      bottom: 80px;
      left: 0; right: 0;
      text-align: center;
      display: none;
      z-index: 30;
    }

    #retrybtn button {
      background: rgba(255,210,60,0.2);
      border: 1px solid rgba(255,210,60,0.5);
      color: #ffd23c;
      padding: 10px 28px;
      border-radius: 22px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div id="app">

    <img id="bg" src="gouda.jpg">

    <div id="overlay"></div>

    <div id="backbtn">
      <button onclick="location.href='index.html'">Terug naar het kompas</button>
    </div>

    <div id="title">
      <h1>Waar ligt Gouda?</h1>
      <p>Draai de man naar Gouda</p>
    </div>

    <div id="compass-area">
      <div id="rotator">
        <img id="person" src="arm.png">
      </div>
    </div>

    <div id="speech">NEE GOUDA LIGT DAAR, KNEUS!</div>

    <div id="retrybtn">
      <button onclick="location.reload()">Opnieuw</button>
    </div>

    <div id="checkbtn">
      <button onclick="checkGuess()">Check!</button>
    </div>

  </div>

<script>
const GOUDA = {lat:52.0116, lng:4.7083};
let userLat = null, userLng = null;

let currentAngle = 0;
let dragging = false;
let startAngle = 0;

function toRad(d){return d*Math.PI/180;}

function bearing(lat1,lng1,lat2,lng2){
  const dL=toRad(lng2-lng1);
  const y=Math.sin(dL)*Math.cos(toRad(lat2));
  const x=Math.cos(toRad(lat1))*Math.sin(toRad(lat2))-
          Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(dL);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

function updateRotation(){
  document.getElementById('rotator').style.transform = `rotate(${currentAngle}deg)`;
}

function getTouchAngle(e){
  const rect = document.getElementById('rotator').getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const x = e.touches[0].clientX - cx;
  const y = e.touches[0].clientY - cy;
  return Math.atan2(y,x)*180/Math.PI;
}

document.getElementById('rotator').addEventListener('touchstart', e=>{
  dragging = true;
  startAngle = getTouchAngle(e) - currentAngle;
});

document.addEventListener('touchmove', e=>{
  if(!dragging) return;
  const angle = getTouchAngle(e);
  currentAngle = angle - startAngle;
  updateRotation();
});

document.addEventListener('touchend', ()=> dragging=false);

function checkGuess(){
  if(userLat===null){
    alert("GPS wordt opgehaald...");
    return;
  }

  const b = bearing(userLat,userLng,GOUDA.lat,GOUDA.lng);
  const correctAngle = b - 270;

  document.getElementById('rotator').style.transition = "transform 1s ease";
  document.getElementById('rotator').style.transform = `rotate(${correctAngle}deg)`;

  document.getElementById('speech').style.display = "block";
  document.getElementById('retrybtn').style.display = "block";
}

navigator.geolocation.getCurrentPosition(
  p=>{
    userLat=p.coords.latitude;
    userLng=p.coords.longitude;
  },
  ()=>{userLat=52.37;userLng=4.89;}
);
</script>

</body>
</html>
